<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pump Log Sheet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-main: #0b0f19;
  --bg-card: rgba(22, 28, 45, 0.75);
  --bg-input: #101524;
  --text-main: #f8fafc;
  --text-muted: #94a3b8;
  --accent: #6366f1;
  --accent-glow: rgba(99, 102, 241, 0.15);
  --emerald: #10b981;
  --border-color: rgba(255, 255, 255, 0.08);
  --border-active: rgba(99, 102, 241, 0.5);
  --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
  --radius: 16px;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background-color: var(--bg-main);
  background-image: 
    radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.08) 0px, transparent 50%),
    radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.04) 0px, transparent 50%);
  color: var(--text-main);
  margin: 0;
  padding: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.loading-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: calc(100vh - 100px);
  gap: 15px;
  color: var(--text-muted);
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid rgba(255, 255, 255, 0.05);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.container {
  max-width: 900px;
  width: calc(100% - 40px);
  margin: 40px auto;
  background: var(--bg-card);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  padding: 50px 60px;
  box-shadow: var(--shadow);
  box-sizing: border-box;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 40px;
  background: rgba(22, 28, 45, 0.4);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border-color);
  position: sticky;
  top: 0;
  z-index: 100;
  box-sizing: border-box;
}

.top-bar-brand {
  font-weight: 700;
  font-size: 1rem;
  letter-spacing: -0.01em;
  background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.nav-actions {
  display: flex;
  gap: 12px;
}

.nav-actions button {
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid var(--border-color);
  padding: 8px 16px;
  cursor: pointer;
  font-size: .85rem;
  color: var(--text-main);
  border-radius: 8px;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
}

.nav-actions button:hover {
  background: var(--accent);
  border-color: var(--accent);
  box-shadow: 0 0 12px var(--accent-glow);
}

.academic-header {
  text-align: center;
  margin-bottom: 40px;
}

.academic-header h1 {
  font-size: 2rem;
  margin: 0 0 10px;
  font-weight: 700;
  background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -0.02em;
}

.academic-header h2 {
  font-size: 1.15rem;
  margin: 0 0 10px;
  font-weight: 500;
  color: var(--accent);
}

.affiliation {
  font-size: 0.8rem;
  margin: 0;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.heavy-rule {
  border: 0;
  border-top: 1px solid var(--border-color);
  margin-top: 25px;
  margin-bottom: 0;
}

.light-rule {
  border: 0;
  border-top: 1px solid var(--border-color);
  margin: 30px 0;
}

.form-section {
  border: 1px solid var(--border-color);
  border-radius: 8px;
  margin: 25px 0;
  padding: 24px;
  background: rgba(0, 0, 0, 0.15);
}

.form-section legend {
  font-weight: 600;
  font-size: 0.85rem;
  padding: 0 12px;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: .08em;
}

.form-group-inline {
  display: flex;
  gap: 25px;
}

.form-group {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.form-group label {
  font-size: .75rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: .05em;
}

.form-group input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border-color);
  border-radius: 8px;
  font-family: inherit;
  font-size: 0.95rem;
  color: var(--text-main);
  background: var(--bg-input);
  box-sizing: border-box;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}

.form-group input:focus {
  outline: none;
  border-color: var(--border-active);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.pump-box {
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border-color);
}

.pump-box:last-child {
  border-bottom: none;
  padding-bottom: 0;
  margin-bottom: 0;
}

.pump-box h4 {
  margin: 0;
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--text-main);
  width: 180px;
}

.time-row {
  display: flex;
  gap: 20px;
  flex: 1;
}

input[type="date"], input[type="time"] {
  color-scheme: dark;
}

.action-row {
  margin-top: 20px;
  padding-top: 15px;
  display: flex;
  justify-content: flex-end;
}

#save-status {
  font-size: .8rem;
  font-weight: 500;
  padding: 6px 14px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border-color);
  border-radius: 20px;
  transition: all 0.3s ease;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--text-muted);
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
  background: var(--text-muted);
}
.status-dot.success {
  background: var(--emerald);
  box-shadow: 0 0 8px var(--emerald);
}
.status-dot.warning {
  background: #f59e0b;
  box-shadow: 0 0 8px #f59e0b;
}
.status-dot.error {
  background: #ef4444;
  box-shadow: 0 0 8px #ef4444;
}

.recent-section {
  margin-top: 40px;
}

.recent-section h3 {
  font-size: 0.9rem;
  font-weight: 600;
  margin-bottom: 15px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
}

.academic-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: .85rem;
  border: 1px solid var(--border-color);
  border-radius: 8px;
  overflow: hidden;
  background: rgba(0, 0, 0, 0.15);
}

.academic-table th, .academic-table td {
  padding: 12px 16px;
  text-align: left;
}

.academic-table th {
  background: rgba(255, 255, 255, 0.02);
  border-bottom: 1px solid var(--border-color);
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  font-size: .75rem;
  letter-spacing: .05em;
}

.academic-table td {
  border-bottom: 1px solid var(--border-color);
}

.academic-table tr:last-child td {
  border-bottom: none;
}

.station-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 20px;
  margin-top: 20px;
}

.station-item {
  padding: 24px;
  border: 1px solid var(--border-color);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  background: rgba(255, 255, 255, 0.02);
  position: relative;
  overflow: hidden;
}

.station-item::before {
  content: '';
  position: absolute;
  top: 0; left: 0; width: 4px; height: 100%;
  background: var(--accent);
  transform: scaleY(0);
  transition: transform 0.25s ease;
  transform-origin: bottom;
}

.station-item:hover {
  border-color: var(--border-active);
  background: rgba(99, 102, 241, 0.05);
  box-shadow: 0 4px 20px rgba(99, 102, 241, 0.1);
  transform: translateY(-2px);
}

.station-item:hover::before {
  transform: scaleY(1);
}

.station-item h3 {
  margin: 0 0 8px;
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--text-main);
}

.station-item p {
  margin: 0;
  color: var(--text-muted);
  font-size: .85rem;
}

@media(max-width:768px){
  .container{padding: 24px 20px; margin: 20px auto; width: calc(100% - 24px);}
  .top-bar{padding: 15px 20px;}
  .form-group-inline{flex-direction:column; gap: 15px;}
  .pump-box{flex-direction:column; align-items:flex-start; gap: 12px; padding-bottom: 20px;}
  .time-row{width:100%; gap: 15px;}
  .academic-table{display:block; overflow-x:auto; white-space:nowrap}
}
</style>
</head>
<body>
<div id="loading" class="loading-container">
  <div class="spinner"></div>
  <p>Loading System...</p>
</div>
<div class="top-bar" id="nav" style="display:none">
  <div class="top-bar-brand">MED Portal</div>
  <div class="nav-actions">
    <button id="back-btn" onclick="goBack()" style="display:none">&larr; Back</button>
    <button id="logout-btn" onclick="logout()" style="display:none">Logout</button>
    <button id="download-btn" onclick="downloadExcel()" style="display:none">Download (.xlsx)</button>
  </div>
</div>
<div class="container" id="app-container" style="display:none">
  <header class="academic-header">
    <h1>Digital Log Sheet: Operational Data</h1>
    <h2 id="header-title">Station Selection</h2>
    <p class="affiliation">Metropolitan Electrical Division, Irrigation &amp; Waterways Directorate</p>
    <hr class="heavy-rule">
  </header>
  
  <div id="view-login" style="display:none">
    <div style="max-width:320px; margin:0 auto; padding: 40px 0;">
      <h3 style="text-align:center; font-weight: 600; margin-bottom: 25px; font-size: 1.25rem;">Agency Login</h3>
      <div class="form-group" style="margin-bottom: 20px;">
        <label>Username</label>
        <input type="text" id="login-user" onkeydown="if(event.key === 'Enter') login()">
      </div>
      <div class="form-group" style="margin-bottom: 25px;">
        <label>Password</label>
        <input type="password" id="login-pass" onkeydown="if(event.key === 'Enter') login()">
      </div>
      <div style="text-align:center;">
        <button onclick="login()" style="width: 100%; padding: 12px; font-size: 0.95rem; cursor:pointer; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: 600; transition: background 0.2s, box-shadow 0.2s;">Sign In</button>
      </div>
      <div id="login-error" style="color:#ef4444; text-align:center; margin-top: 15px; font-size: 0.85rem; font-style:italic;"></div>
    </div>
  </div>

  <div id="view-select" style="display:none"><div id="list-container"></div></div>
  <div id="view-form" style="display:none">
    <div id="data-form">
      <fieldset class="form-section"><legend>I. General Information</legend>
        <div class="form-group-inline">
          <div class="form-group"><label>Date of Observation *</label><input type="date" id="f-date" required></div>
          <div class="form-group"><label>Operator / Recorder Name</label><input type="text" id="f-name"></div>
        </div>
      </fieldset>
      <fieldset class="form-section"><legend>II. Pump Operational Metrics</legend>
        <div id="pump-inputs"></div>
      </fieldset>
      <div class="action-row"><span id="save-status" style="color:#666">Live Sync: Ready</span></div>
    </div>
    <div class="recent-section">
      <hr class="light-rule">
      <h3>Table 1: Recent Observations</h3>
      <div id="recent-list"></div>
    </div>
  </div>
</div>

<script>
var currentStation = '', stations = [];

function getAuthHeader() {
  var t = localStorage.getItem('authToken');
  return t ? { 'Authorization': 'Basic ' + t } : {};
}

function login() {
  var u = document.getElementById('login-user').value;
  var p = document.getElementById('login-pass').value;
  if (!u || !p) return;
  var token = btoa(u + ':' + p);
  
  document.getElementById('login-error').innerText = 'Authenticating...';
  
  fetch('/api/login', {
    headers: { 'Authorization': 'Basic ' + token }
  })
  .then(function(r) { return r.json().then(function(d) { return {ok: r.ok, data: d} }); })
  .then(function(res) {
    if (res.ok) {
      localStorage.setItem('authToken', token);
      document.getElementById('login-error').innerText = '';
      loadLocations();
    } else {
      document.getElementById('login-error').innerText = res.data.error || 'Invalid credentials';
    }
  })
  .catch(function() { document.getElementById('login-error').innerText = 'Network Error'; });
}

function logout() {
  localStorage.removeItem('authToken');
  location.reload();
}

function downloadExcel() {
  var t = localStorage.getItem('authToken');
  if (t) {
    window.open('/api/download?token=' + encodeURIComponent(t));
  } else {
    alert('Please log in to download the log sheet.');
  }
}

window.onload = function() {
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
  var n = localStorage.getItem('opName');
  if (n) document.getElementById('f-name').value = n;

  document.getElementById('loading').style.display = 'none';
  document.getElementById('nav').style.display = 'flex';
  document.getElementById('app-container').style.display = 'block';

  if (localStorage.getItem('authToken')) {
    loadLocations();
  } else {
    document.getElementById('view-login').style.display = 'block';
  }
};

function loadLocations() {
  document.getElementById('view-login').style.display = 'none';
  document.getElementById('view-select').style.display = 'block';
  document.getElementById('logout-btn').style.display = 'inline-block';
  document.getElementById('list-container').innerHTML = '<p class="center-text">Loading stations...</p>';

  fetch('/api/locations', { headers: getAuthHeader() })
    .then(function(r) { if(r.status===401) logout(); return r.json(); })
    .then(function(d) {
      stations = d.locations || [];
      renderList();
    })
    .catch(function(e) { console.error(e); document.getElementById('list-container').innerHTML = '<p class="center-text" style="color:red">Error loading stations.</p>'; });
}

function renderList() {
  var h = '';
  for (var i = 0; i < stations.length; i++) {
    var s = stations[i];
    h += '<div class="station-item" onclick="openStation(\'' + s.sheetName + '\',\'' + s.displayName + '\')">' +
         '<h3>' + s.displayName + '</h3>' +
         '<p>Recorded entries: ' + s.entriesCount + ' / ' + s.maxEntries + '</p></div>';
  }
  document.getElementById('list-container').innerHTML = h;
}

function openStation(id, name) {
  currentStation = id;
  document.getElementById('header-title').innerText = name;
  document.getElementById('view-select').style.display = 'none';
  document.getElementById('view-form').style.display = 'block';
  document.getElementById('back-btn').style.display = 'inline-block';
  var h = '';
  for (var i = 1; i <= 5; i++) {
    h += '<div class="pump-box"><h4>Pump Unit ' + i + '</h4>' +
         '<div class="time-row">' +
         '<div class="form-group"><label>Start Time</label><input type="time" id="p' + i + '-start"></div>' +
         '<div class="form-group"><label>Stop Time</label><input type="time" id="p' + i + '-stop"></div>' +
         '</div></div>';
  }
  document.getElementById('pump-inputs').innerHTML = h;
  var inputs = document.querySelectorAll('#data-form input');
  for (var j = 0; j < inputs.length; j++) inputs[j].addEventListener('input', saveLive);
  document.getElementById('f-date').addEventListener('change', function() { clearForm(); loadRecent(); });
  loadRecent();
}

function clearForm() {
  for (var i = 1; i <= 5; i++) {
    document.getElementById('p' + i + '-start').value = '';
    document.getElementById('p' + i + '-stop').value = '';
  }
}

function goBack() {
  document.getElementById('header-title').innerText = 'Station Selection';
  document.getElementById('view-select').style.display = 'block';
  document.getElementById('view-form').style.display = 'none';
  document.getElementById('back-btn').style.display = 'none';
}

var saveTimeout = null;
function saveLive() {
  clearTimeout(saveTimeout);
  var st = document.getElementById('save-status');
  if (!st) return;
  st.innerText = 'Live Sync: Saving...'; st.style.color = '#d35400';
  saveTimeout = setTimeout(function() {
    var date = document.getElementById('f-date').value;
    var name = document.getElementById('f-name').value;
    if (!date) { st.innerText = 'Date required'; st.style.color = 'red'; return; }
    var pumps = {}, hasData = false;
    for (var i = 1; i <= 5; i++) {
      var a = document.getElementById('p' + i + '-start').value;
      var b = document.getElementById('p' + i + '-stop').value;
      if (a || b) { hasData = true; pumps[i] = { start: a, stop: b }; }
    }
    if (!hasData) { st.innerText = 'Live Sync: Ready'; st.style.color = '#666'; return; }
    localStorage.setItem('opName', name);
    fetch('/api/entry', {
      method: 'POST',
      headers: Object.assign({ 'Content-Type': 'application/json' }, getAuthHeader()),
      body: JSON.stringify({ sheetName: currentStation, date: date, pumps: pumps, operatorName: name })
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.success) { st.innerText = 'Saved \u2713'; st.style.color = 'green'; loadRecent(); }
      else { st.innerText = 'Error: ' + (d.error || 'Failed'); st.style.color = 'red'; }
    })
    .catch(function() { st.innerText = 'Network error'; st.style.color = 'red'; });
  }, 1000);
}

function loadRecent() {
  fetch('/api/recent?sheet=' + currentStation, { headers: getAuthHeader() })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var h = '';
      if (!d.entries || d.entries.length === 0) {
        h = '<p style="text-align:center;font-style:italic">No observations recorded yet.</p>';
      } else {
        h = '<table class="academic-table"><thead><tr><th>Date</th><th>Operator</th><th>P1</th><th>P2</th><th>P3</th><th>P4</th><th>P5</th></tr></thead><tbody>';
        for (var i = 0; i < d.entries.length; i++) {
          var row = d.entries[i];
          h += '<tr><td><strong>' + row.date + '</strong></td><td>' + (row.operator || '\u2014') + '</td>';
          for (var p = 1; p <= 5; p++) {
            var pm = row.pumps[p];
            h += '<td>' + ((pm && (pm.start || pm.stop)) ? (pm.start || '-') + ' \u2192 ' + (pm.stop || '-') : '\u2014') + '</td>';
          }
          h += '</tr>';
        }
        h += '</tbody></table>';
      }
      document.getElementById('recent-list').innerHTML = h;

      var cd = document.getElementById('f-date').value;
      var td = d.entries && d.entries.find(function(e) { return e.date === cd; });
      var empty = true;
      for (var i = 1; i <= 5; i++) {
        if (document.getElementById('p' + i + '-start').value || document.getElementById('p' + i + '-stop').value) { empty = false; break; }
      }
      if (td && empty) {
        for (var i = 1; i <= 5; i++) {
          var pp = td.pumps[i];
          if (pp) {
            if (pp.start) document.getElementById('p' + i + '-start').value = pp.start;
            if (pp.stop) document.getElementById('p' + i + '-stop').value = pp.stop;
          }
        }
      }
    })
    .catch(function(e) { console.log('err', e); });
}
</script>
</body>
</html>
