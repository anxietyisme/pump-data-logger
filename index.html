<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <meta name="theme-color" content="#0b3d6e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Pump Log Sheet &middot; MED Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lora:wght@500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      /* Surfaces */
      --page-bg: #eef1f5;
      --surface: #ffffff;
      --surface-alt: #f5f7fa;
      --surface-sunken: #eef2f6;

      /* Ink */
      --ink-900: #102a43;
      --ink-700: #33526e;
      --ink-500: #5f7991;
      --ink-300: #9fb3c8;

      /* Lines */
      --line: #d9e2ec;
      --line-strong: #bcccdc;

      /* Brand: official navy + maroon, restrained gold accent */
      --navy: #0b3d6e;
      --navy-dark: #082c50;
      --navy-darker: #061d35;
      --maroon: #8a1f2b;
      --maroon-dark: #6e1721;
      --gold: #9c7a2e;
      --teal: #0f6e6e;
      --amber-deep: #8a5a00;
      --plum: #5b3b8a;

      /* Status */
      --success: #1c7c54;
      --success-bg: #e6f4ec;
      --warning: #a15c00;
      --warning-bg: #fbf0de;
      --danger: #b3261e;
      --danger-bg: #fbeaea;

      --radius-md: 8px;
      --radius-lg: 12px;
      --shadow-sm: 0 1px 2px rgba(16, 42, 67, 0.07);
      --shadow-md: 0 6px 16px rgba(16, 42, 67, 0.08);
      --shadow-lg: 0 16px 32px rgba(16, 42, 67, 0.14);

      --font-body: 'Inter', system-ui, -apple-system, sans-serif;
      --font-display: 'Lora', Georgia, serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--page-bg);
      color: var(--ink-900);
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
    }

    :focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 2px;
      border-radius: 4px;
    }

    /* Seal / signature mark */
    .seal {
      color: currentColor;
      flex-shrink: 0;
    }

    .seal--sm {
      width: 30px;
      height: 30px;
    }

    .seal--lg {
      width: 52px;
      height: 52px;
    }

    /* Top letterhead bar */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      padding-top: max(12px, env(safe-area-inset-top));
      background: linear-gradient(120deg, var(--navy) 0%, var(--navy-dark) 55%, var(--teal) 150%);
      border-bottom: 3px solid var(--gold);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-md);
    }

    .top-bar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #fff;
      min-width: 0;
    }

    .top-bar-brand .seal {
      color: #d8c98f;
    }

    .top-bar-brand .brand-text {
      display: flex;
      flex-direction: column;
      line-height: 1.25;
      min-width: 0;
    }

    .top-bar-brand .brand-name {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.02rem;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }

    .top-bar-brand .brand-sub {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #b9cce3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .nav-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .nav-actions button {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.28);
      padding: 9px 14px;
      cursor: pointer;
      font-size: 0.78rem;
      color: #fff;
      border-radius: var(--radius-md);
      font-weight: 600;
      font-family: var(--font-body);
      transition: background 0.15s ease;
      min-height: 38px;
    }

    .nav-actions button:hover {
      background: rgba(255, 255, 255, 0.18);
    }

    .nav-actions button:active {
      background: rgba(255, 255, 255, 0.26);
    }

    #download-btn {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--navy-darker);
    }

    #download-btn:hover {
      background: #ad8a3d;
    }

    /* Layout */
    .container {
      max-width: 880px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 20px 48px;
      box-sizing: border-box;
      flex: 1;
    }

    /* Letterhead-style page header */
    .academic-header {
      background:
        linear-gradient(180deg, var(--navy), var(--teal), var(--maroon), var(--gold)) left top / 4px 100% no-repeat,
        var(--surface);
      border: 1px solid var(--line);
      padding: 22px 24px 22px 28px;
      border-radius: var(--radius-lg);
      margin-bottom: 24px;
      box-shadow: var(--shadow-sm);
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }

    .academic-header .seal {
      color: var(--navy);
      margin-top: 2px;
    }

    .affiliation {
      font-size: 0.7rem;
      margin: 0 0 6px 0;
      color: var(--maroon);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
    }

    .academic-header h1 {
      font-family: var(--font-display);
      font-size: 1.4rem;
      margin: 0 0 4px 0;
      font-weight: 700;
      color: var(--navy-darker);
      letter-spacing: -0.01em;
    }

    .academic-header h2 {
      font-size: 0.95rem;
      margin: 0;
      font-weight: 500;
      color: var(--ink-500);
    }

    /* Login */
    .login-wrapper {
      max-width: 400px;
      margin: 48px auto 0 auto;
      padding: 0 20px;
      box-sizing: border-box;
      width: 100%;
    }

    .login-card {
      padding: 32px 28px;
      background:
        linear-gradient(90deg, var(--navy), var(--teal), var(--maroon), var(--gold)) left top / 100% 4px no-repeat,
        var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      text-align: center;
    }

    .login-card .seal {
      color: var(--navy);
      margin: 0 auto 14px;
    }

    .login-card h3 {
      font-family: var(--font-display);
      font-weight: 700;
      margin: 0 0 6px 0;
      font-size: 1.25rem;
      color: var(--navy-darker);
    }

    .login-card p {
      font-size: 0.84rem;
      color: var(--ink-500);
      margin: 0 0 26px 0;
      line-height: 1.6;
    }

    .login-card .form-group {
      text-align: left;
    }

    .login-btn {
      width: 100%;
      padding: 13px;
      font-size: 0.9rem;
      cursor: pointer;
      background: var(--navy);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-weight: 700;
      font-family: var(--font-body);
      transition: background 0.15s ease;
      min-height: 46px;
    }

    .login-btn:hover {
      background: var(--navy-dark);
    }

    .login-btn:active {
      background: var(--navy-darker);
    }

    #login-error {
      color: var(--danger);
      text-align: left;
      margin-top: 14px;
      font-size: 0.8rem;
      font-weight: 600;
      min-height: 1.2em;
    }

    /* Form shell */
    .form-section {
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      margin: 18px 0;
      padding: 22px;
      background: var(--surface);
      box-shadow: var(--shadow-sm);
    }

    .form-section legend {
      font-weight: 700;
      font-size: 0.72rem;
      padding: 0 0 10px 0;
      margin-bottom: 6px;
      color: var(--navy-darker);
      border-bottom: 1px solid var(--line);
      width: 100%;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      display: block;
    }

    .form-group-inline {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--ink-700);
    }

    .form-group input {
      width: 100%;
      padding: 13px 14px;
      border: 1.5px solid var(--line-strong);
      border-radius: var(--radius-md);
      font-family: inherit;
      font-size: 1rem;
      color: var(--ink-900);
      background: var(--surface-alt);
      box-sizing: border-box;
      transition: border-color 0.15s ease, background 0.15s ease;
      min-height: 46px;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--navy);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(11, 61, 110, 0.14);
    }

    /* Pump rows */
    #pump-inputs {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .pump-box {
      padding: 16px 18px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      box-shadow: inset 4px 0 0 0 var(--line-strong);
    }

    #pump-inputs .pump-box:nth-child(1) {
      box-shadow: inset 4px 0 0 0 var(--navy);
    }

    #pump-inputs .pump-box:nth-child(2) {
      box-shadow: inset 4px 0 0 0 var(--maroon);
    }

    #pump-inputs .pump-box:nth-child(3) {
      box-shadow: inset 4px 0 0 0 var(--teal);
    }

    #pump-inputs .pump-box:nth-child(4) {
      box-shadow: inset 4px 0 0 0 var(--amber-deep);
    }

    #pump-inputs .pump-box:nth-child(5) {
      box-shadow: inset 4px 0 0 0 var(--plum);
    }

    #pump-inputs .pump-box:nth-child(1) .pump-badge {
      background: var(--navy);
    }

    #pump-inputs .pump-box:nth-child(2) .pump-badge {
      background: var(--maroon);
    }

    #pump-inputs .pump-box:nth-child(3) .pump-badge {
      background: var(--teal);
    }

    #pump-inputs .pump-box:nth-child(4) .pump-badge {
      background: var(--amber-deep);
    }

    #pump-inputs .pump-box:nth-child(5) .pump-badge {
      background: var(--plum);
    }

    .pump-label {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .pump-badge {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--navy);
      color: #fff;
      font-family: var(--font-mono);
      font-size: 0.78rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .pump-label h4 {
      margin: 0;
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--ink-900);
    }

    .time-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    input[type="date"],
    input[type="time"] {
      color-scheme: light;
      font-family: var(--font-mono);
      font-weight: 600;
    }

    .action-row {
      margin-top: 20px;
      display: flex;
      justify-content: flex-end;
    }

    #save-status {
      font-size: 0.78rem;
      font-weight: 700;
      padding: 9px 16px;
      background: var(--surface-alt);
      border: 1px solid var(--line);
      border-radius: 30px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--ink-500);
    }

    #save-status .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    /* Station directory */
    #list-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 4px;
    }

    .station-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 16px;
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      cursor: pointer;
      background: var(--surface);
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      min-height: 44px;
    }

    .station-item:hover {
      border-color: var(--navy);
      box-shadow: var(--shadow-sm);
    }

    .station-item:active {
      background: var(--surface-alt);
    }

    .station-index {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 1rem;
      color: var(--line-strong);
      min-width: 26px;
    }

    .station-main h3 {
      margin: 0 0 3px 0;
      font-size: 1rem;
      font-weight: 700;
      color: var(--ink-900);
    }

    .station-main p {
      margin: 0;
      color: var(--ink-500);
      font-size: 0.8rem;
    }

    .station-meta {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .count-pill {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      font-weight: 700;
      padding: 4px 9px;
      border-radius: 30px;
      background: var(--success-bg);
      color: var(--success);
      white-space: nowrap;
    }

    .count-pill--full {
      background: var(--warning-bg);
      color: var(--warning);
    }

    .chevron {
      color: var(--ink-300);
      font-size: 1.3rem;
      line-height: 1;
    }

    .empty-note {
      text-align: center;
      font-style: italic;
      color: var(--ink-500);
      padding: 32px 0;
      font-size: 0.88rem;
    }

    /* Recent log — card based, mobile-friendly */
    .recent-section {
      margin-top: 40px;
    }

    .recent-section h3 {
      font-size: 0.78rem;
      font-weight: 700;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--maroon);
    }

    #recent-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }

    .log-card {
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--surface);
      padding: 14px 16px;
      box-shadow: var(--shadow-sm);
    }

    .log-card-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
    }

    .log-date {
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 0.8rem;
      color: #fff;
      background: var(--navy);
      padding: 3px 9px;
      border-radius: 5px;
    }

    .log-operator {
      font-size: 0.78rem;
      color: var(--ink-500);
      text-align: right;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .log-pumps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(105px, 1fr));
      gap: 8px;
    }

    .log-pump-cell {
      background: var(--surface-alt);
      border-radius: 6px;
      padding: 7px 9px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      box-shadow: inset 3px 0 0 0 var(--line-strong);
    }

    .log-pumps-grid .log-pump-cell:nth-child(1) {
      box-shadow: inset 3px 0 0 0 var(--navy);
    }

    .log-pumps-grid .log-pump-cell:nth-child(2) {
      box-shadow: inset 3px 0 0 0 var(--maroon);
    }

    .log-pumps-grid .log-pump-cell:nth-child(3) {
      box-shadow: inset 3px 0 0 0 var(--teal);
    }

    .log-pumps-grid .log-pump-cell:nth-child(4) {
      box-shadow: inset 3px 0 0 0 var(--amber-deep);
    }

    .log-pumps-grid .log-pump-cell:nth-child(5) {
      box-shadow: inset 3px 0 0 0 var(--plum);
    }

    .log-pumps-grid .log-pump-cell:nth-child(1) .lp-label {
      color: var(--navy);
    }

    .log-pumps-grid .log-pump-cell:nth-child(2) .lp-label {
      color: var(--maroon);
    }

    .log-pumps-grid .log-pump-cell:nth-child(3) .lp-label {
      color: var(--teal);
    }

    .log-pumps-grid .log-pump-cell:nth-child(4) .lp-label {
      color: var(--amber-deep);
    }

    .log-pumps-grid .log-pump-cell:nth-child(5) .lp-label {
      color: var(--plum);
    }

    .lp-label {
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--ink-500);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .lp-time {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--ink-900);
    }

    .lp-time.is-empty {
      color: var(--ink-300);
    }

    /* Loading */
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
      color: var(--ink-500);
      background: var(--page-bg);
    }

    .spinner {
      width: 34px;
      height: 34px;
      border: 3px solid var(--line);
      border-top-color: var(--navy);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
    }

    /* Mobile rules */
    @media (max-width: 768px) {
      .top-bar {
        padding: 10px 14px;
        padding-top: max(10px, env(safe-area-inset-top));
      }

      .top-bar-brand .brand-name {
        font-size: 0.92rem;
      }

      .nav-actions button {
        padding: 8px 11px;
        font-size: 0.74rem;
      }

      .container {
        padding: 18px 14px 32px;
      }

      .academic-header {
        padding: 16px;
        gap: 12px;
      }

      .academic-header .seal--lg {
        width: 38px;
        height: 38px;
      }

      .academic-header h1 {
        font-size: 1.15rem;
      }

      .academic-header h2 {
        font-size: 0.86rem;
      }

      .form-section {
        padding: 16px;
        margin: 14px 0;
      }

      .form-group-inline {
        gap: 14px;
      }

      .station-item {
        grid-template-columns: auto 1fr auto;
        padding: 14px;
        gap: 12px;
      }

      .log-card-head {
        flex-direction: column;
        align-items: flex-start;
        gap: 2px;
      }

      .log-operator {
        text-align: left;
        max-width: 100%;
      }

      #view-form {
        padding-bottom: 78px;
      }

      .action-row {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        margin: 0;
        justify-content: center;
        background: var(--navy-dark);
        padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
        box-shadow: 0 -6px 18px rgba(6, 29, 53, 0.25);
        z-index: 80;
      }

      #save-status {
        width: 100%;
        max-width: 360px;
        justify-content: center;
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.22);
        color: #e8eef5;
      }
    }
  </style>
</head>

<body>

  <div id="loading" class="loading-container">
    <div class="spinner"></div>
    <p style="font-size: 0.85rem; font-weight: 600;">Loading portal&hellip;</p>
  </div>

  <div class="top-bar" id="nav" style="display:none">
    <div class="top-bar-brand">
      <svg class="seal seal--sm" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="32" cy="32" r="29" stroke="currentColor" stroke-width="2"></circle>
        <circle cx="32" cy="32" r="23" stroke="currentColor" stroke-width="1" stroke-dasharray="2 3"></circle>
        <path d="M32 15c-5.5 6.5-9.5 11.5-9.5 17.5a9.5 9.5 0 0019 0c0-6-4-11-9.5-17.5z" stroke="currentColor"
          stroke-width="2" stroke-linejoin="round"></path>
        <path d="M21 41l3.6-4.5 3.6 3.6 3.8-5.4 3.6 4.5 3.6-3.6" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round"></path>
      </svg>
      <div class="brand-text">
        <span class="brand-name">MED Portal</span>
      </div>
    </div>
    <div class="nav-actions">
      <button id="back-btn" onclick="goBack()" style="display:none">&larr; Stations</button>
      <button id="download-btn" onclick="downloadExcel()" style="display:none">Export</button>
      <button id="logout-btn" onclick="logout()" style="display:none">Sign Out</button>
    </div>
  </div>

  <div id="view-login" style="display:none">
    <div class="login-wrapper">
      <div class="login-card">
        <svg class="seal seal--lg" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true">
          <circle cx="32" cy="32" r="29" stroke="currentColor" stroke-width="2"></circle>
          <circle cx="32" cy="32" r="23" stroke="currentColor" stroke-width="1" stroke-dasharray="2 3"></circle>
          <path d="M32 15c-5.5 6.5-9.5 11.5-9.5 17.5a9.5 9.5 0 0019 0c0-6-4-11-9.5-17.5z" stroke="currentColor"
            stroke-width="2" stroke-linejoin="round"></path>
          <path d="M21 41l3.6-4.5 3.6 3.6 3.8-5.4 3.6 4.5 3.6-3.6" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
        <h3>Sign In</h3>
        <div class="form-group" style="margin-bottom: 16px; margin-top: 22px;">
          <label for="login-user">Username</label>
          <input type="text" id="login-user" autocomplete="username" onkeydown="if(event.key === 'Enter') login()">
        </div>
        <div class="form-group" style="margin-bottom: 22px;">
          <label for="login-pass">Password</label>
          <input type="password" id="login-pass" autocomplete="current-password"
            onkeydown="if(event.key === 'Enter') login()">
        </div>
        <div>
          <button class="login-btn" onclick="login()">Sign In</button>
        </div>
        <div id="login-error"></div>
      </div>
    </div>
  </div>

  <div class="container" id="app-container" style="display:none">
    <header class="academic-header" id="dashboard-header" style="display:none">
      <svg class="seal seal--lg" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="32" cy="32" r="29" stroke="currentColor" stroke-width="2"></circle>
        <circle cx="32" cy="32" r="23" stroke="currentColor" stroke-width="1" stroke-dasharray="2 3"></circle>
        <path d="M32 15c-5.5 6.5-9.5 11.5-9.5 17.5a9.5 9.5 0 0019 0c0-6-4-11-9.5-17.5z" stroke="currentColor"
          stroke-width="2" stroke-linejoin="round"></path>
        <path d="M21 41l3.6-4.5 3.6 3.6 3.8-5.4 3.6 4.5 3.6-3.6" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round"></path>
      </svg>
      <div>
        <p class="affiliation">Metropolitan Electrical Division &middot; Irrigation &amp; Waterways Directorate</p>
        <h2 id="header-title">Station Selection</h2>
      </div>
    </header>

    <div id="view-select" style="display:none">
      <div id="list-container"></div>
    </div>

    <div id="view-form" style="display:none">
      <div id="data-form">
        <fieldset class="form-section">
          <legend>Details</legend>
          <div class="form-group-inline">
            <div class="form-group"><label for="f-date">Date *</label><input type="date" id="f-date" required></div>
            <div class="form-group"><label for="f-name">Operator</label><input type="text" id="f-name"></div>
          </div>
        </fieldset>
        <fieldset class="form-section">
          <legend>Pump Log</legend>
          <div id="pump-inputs"></div>
        </fieldset>
        <div class="action-row"><span id="save-status"><span class="dot"></span>Ready</span></div>
      </div>
      <div class="recent-section">
        <h3>Log History</h3>
        <div id="recent-list"></div>
      </div>
    </div>
  </div>

  <script>
    var currentStation = '', stations = [];

    function esc(s) { return s === undefined || s === null ? '' : String(s); }

    function getAuthHeader() {
      var t = localStorage.getItem('authToken');
      return t ? { 'Authorization': 'Basic ' + t } : {};
    }

    function login() {
      var u = document.getElementById('login-user').value;
      var p = document.getElementById('login-pass').value;
      if (!u || !p) return;
      var token = btoa(u + ':' + p);

      document.getElementById('login-error').innerText = 'Authenticating...';

      fetch('/api/login', {
        headers: { 'Authorization': 'Basic ' + token }
      })
        .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d } }); })
        .then(function (res) {
          if (res.ok) {
            localStorage.setItem('authToken', token);
            document.getElementById('login-error').innerText = '';
            loadLocations();
          } else {
            document.getElementById('login-error').innerText = res.data.error || 'Invalid credentials';
          }
        })
        .catch(function () { document.getElementById('login-error').innerText = 'Network error. Please try again.'; });
    }

    function logout() {
      localStorage.removeItem('authToken');
      location.reload();
    }

    function downloadExcel() {
      var t = localStorage.getItem('authToken');
      if (t) {
        window.open('/api/download?token=' + encodeURIComponent(t));
      } else {
        alert('Please sign in to download the log sheet.');
      }
    }

    window.onload = function () {
      document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
      var n = localStorage.getItem('opName');
      if (n) document.getElementById('f-name').value = n;

      document.getElementById('loading').style.display = 'none';
      document.getElementById('nav').style.display = 'flex';

      if (localStorage.getItem('authToken')) {
        document.getElementById('app-container').style.display = 'block';
        loadLocations();
      } else {
        document.getElementById('view-login').style.display = 'block';
      }
    };

    function loadLocations() {
      document.getElementById('view-login').style.display = 'none';
      document.getElementById('app-container').style.display = 'block';
      document.getElementById('dashboard-header').style.display = 'flex';
      document.getElementById('view-select').style.display = 'block';
      document.getElementById('logout-btn').style.display = 'inline-block';
      document.getElementById('download-btn').style.display = 'inline-block';
      document.getElementById('list-container').innerHTML = '<p class="empty-note">Loading stations&hellip;</p>';

      fetch('/api/locations', { headers: getAuthHeader() })
        .then(function (r) { if (r.status === 401) { logout(); return Promise.reject('unauthorized'); } return r.json(); })
        .then(function (d) {
          stations = d.locations || [];
          renderList();
        })
        .catch(function (e) {
          if (e === 'unauthorized') return;
          console.error(e);
          document.getElementById('list-container').innerHTML = '<p class="empty-note" style="color:var(--danger)">Error loading stations.</p>';
        });
    }

    function renderList() {
      var container = document.getElementById('list-container');
      container.innerHTML = '';

      if (!stations.length) {
        container.innerHTML = '<p class="empty-note">No stations available.</p>';
        return;
      }

      stations.forEach(function (s, idx) {
        var row = document.createElement('div');
        row.className = 'station-item';
        row.setAttribute('role', 'button');
        row.setAttribute('tabindex', '0');

        var pct = s.maxEntries ? (s.entriesCount / s.maxEntries) : 0;

        var indexEl = document.createElement('span');
        indexEl.className = 'station-index';
        indexEl.textContent = String(idx + 1).padStart(2, '0');

        var mainEl = document.createElement('span');
        mainEl.className = 'station-main';
        var h3 = document.createElement('h3');
        h3.textContent = s.displayName;
        mainEl.appendChild(h3);

        var metaEl = document.createElement('span');
        metaEl.className = 'station-meta';
        var pill = document.createElement('span');
        pill.className = 'count-pill' + (pct >= 0.9 ? ' count-pill--full' : '');
        pill.textContent = s.entriesCount + '/' + s.maxEntries;
        var chevron = document.createElement('span');
        chevron.className = 'chevron';
        chevron.setAttribute('aria-hidden', 'true');
        chevron.innerHTML = '&rsaquo;';
        metaEl.appendChild(pill);
        metaEl.appendChild(chevron);

        row.appendChild(indexEl);
        row.appendChild(mainEl);
        row.appendChild(metaEl);

        row.addEventListener('click', function () { openStation(s.sheetName, s.displayName); });
        row.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openStation(s.sheetName, s.displayName); }
        });

        container.appendChild(row);
      });
    }

    function openStation(id, name) {
      currentStation = id;
      document.getElementById('header-title').innerText = name;
      document.getElementById('view-select').style.display = 'none';
      document.getElementById('view-form').style.display = 'block';
      document.getElementById('back-btn').style.display = 'inline-block';

      var wrap = document.getElementById('pump-inputs');
      wrap.innerHTML = '';
      for (var i = 1; i <= 5; i++) {
        var box = document.createElement('div');
        box.className = 'pump-box';
        box.innerHTML =
          '<div class="pump-label"><span class="pump-badge">' + i + '</span><h4>Pump Unit ' + i + '</h4></div>' +
          '<div class="time-row">' +
          '<div class="form-group"><label for="p' + i + '-start">Start Time</label><input type="time" id="p' + i + '-start"></div>' +
          '<div class="form-group"><label for="p' + i + '-stop">Stop Time</label><input type="time" id="p' + i + '-stop"></div>' +
          '</div>';
        wrap.appendChild(box);
      }

      var inputs = document.querySelectorAll('#data-form input');
      for (var j = 0; j < inputs.length; j++) inputs[j].addEventListener('input', saveLive);
      document.getElementById('f-date').addEventListener('change', function () { clearForm(); loadRecent(); });
      loadRecent();
    }

    function clearForm() {
      for (var i = 1; i <= 5; i++) {
        document.getElementById('p' + i + '-start').value = '';
        document.getElementById('p' + i + '-stop').value = '';
      }
    }

    function goBack() {
      document.getElementById('header-title').innerText = 'Station Selection';
      document.getElementById('view-select').style.display = 'block';
      document.getElementById('view-form').style.display = 'none';
      document.getElementById('back-btn').style.display = 'none';
    }

    var saveTimeout = null;
    function setStatus(text, color) {
      var st = document.getElementById('save-status');
      if (!st) return;
      var dot = st.querySelector('.dot');
      st.textContent = '';
      if (dot) st.appendChild(dot);
      else { dot = document.createElement('span'); dot.className = 'dot'; st.appendChild(dot); }
      st.appendChild(document.createTextNode(text));
      st.style.color = color;
    }

    function saveLive() {
      clearTimeout(saveTimeout);
      setStatus('Saving\u2026', 'var(--warning)');
      saveTimeout = setTimeout(function () {
        var date = document.getElementById('f-date').value;
        var name = document.getElementById('f-name').value;
        if (!date) { setStatus('Date required', 'var(--danger)'); return; }
        var pumps = {}, hasData = false;
        for (var i = 1; i <= 5; i++) {
          var a = document.getElementById('p' + i + '-start').value;
          var b = document.getElementById('p' + i + '-stop').value;
          if (a || b) { hasData = true; pumps[i] = { start: a, stop: b }; }
        }
        if (!hasData) { setStatus('Ready', 'var(--ink-500)'); return; }
        localStorage.setItem('opName', name);
        fetch('/api/entry', {
          method: 'POST',
          headers: Object.assign({ 'Content-Type': 'application/json' }, getAuthHeader()),
          body: JSON.stringify({ sheetName: currentStation, date: date, pumps: pumps, operatorName: name })
        })
          .then(function (r) { return r.json(); })
          .then(function (d) {
            if (d.success) { setStatus('Saved \u2713', 'var(--success)'); loadRecent(); }
            else { setStatus('Error: ' + (d.error || 'Failed'), 'var(--danger)'); }
          })
          .catch(function () { setStatus('Network error', 'var(--danger)'); });
      }, 1000);
    }

    function loadRecent() {
      fetch('/api/recent?sheet=' + currentStation, { headers: getAuthHeader() })
        .then(function (r) { return r.json(); })
        .then(function (d) {
          var container = document.getElementById('recent-list');
          container.innerHTML = '';

          if (!d.entries || d.entries.length === 0) {
            container.innerHTML = '<p class="empty-note">No entries yet.</p>';
          } else {
            d.entries.forEach(function (row) {
              var card = document.createElement('div');
              card.className = 'log-card';

              var head = document.createElement('div');
              head.className = 'log-card-head';
              var dateEl = document.createElement('span');
              dateEl.className = 'log-date';
              dateEl.textContent = row.date;
              var opEl = document.createElement('span');
              opEl.className = 'log-operator';
              opEl.textContent = row.operator || '\u2014';
              head.appendChild(dateEl);
              head.appendChild(opEl);

              var grid = document.createElement('div');
              grid.className = 'log-pumps-grid';
              for (var p = 1; p <= 5; p++) {
                var pm = row.pumps[p];
                var cell = document.createElement('div');
                cell.className = 'log-pump-cell';
                var lbl = document.createElement('span');
                lbl.className = 'lp-label';
                lbl.textContent = 'P' + p;
                var time = document.createElement('span');
                var has = pm && (pm.start || pm.stop);
                time.className = 'lp-time' + (has ? '' : ' is-empty');
                time.textContent = has ? (pm.start || '\u2014') + ' \u2192 ' + (pm.stop || '\u2014') : '\u2014';
                cell.appendChild(lbl);
                cell.appendChild(time);
                grid.appendChild(cell);
              }

              card.appendChild(head);
              card.appendChild(grid);
              container.appendChild(card);
            });
          }

          var cd = document.getElementById('f-date').value;
          var td = d.entries && d.entries.find(function (e) { return e.date === cd; });
          var empty = true;
          for (var i = 1; i <= 5; i++) {
            if (document.getElementById('p' + i + '-start').value || document.getElementById('p' + i + '-stop').value) { empty = false; break; }
          }
          if (td && empty) {
            for (var i = 1; i <= 5; i++) {
              var pp = td.pumps[i];
              if (pp) {
                if (pp.start) document.getElementById('p' + i + '-start').value = pp.start;
                if (pp.stop) document.getElementById('p' + i + '-stop').value = pp.stop;
              }
            }
          }
        })
        .catch(function (e) { console.log('err', e); });
    }
  </script>
</body>

</html>
